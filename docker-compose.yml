version: '3.8'

services:

  # ============================
  # Eureka Server
  # ============================
  eureka-server:
    build:
      context: ./eureka
    container_name: eureka-server
    ports:
      - "8761:8761"

  # ============================
  # QUESTION DB
  # ============================
  question-db:
    image: postgres:15
    container_name: question-db
    environment:
      POSTGRES_DB: questiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Javheri@123
    ports:
      - "5433:5432"
    volumes:
      - question_data:/var/lib/postgresql/data

  # ============================
  # QUIZ DB
  # ============================
  quiz-db:
    image: postgres:15
    container_name: quiz-db
    environment:
      POSTGRES_DB: quizdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Javheri@123
    ports:
      - "5434:5432"
    volumes:
      - quiz_data:/var/lib/postgresql/data

  # ============================
  # QUESTION SERVICE
  # ============================
  question-service:
    build:
      context: ./service
    container_name: question-service
    depends_on:
      - question-db
      - eureka-server
    ports:
      - "8080:8080"

  # ============================
  # QUIZ SERVICE
  # ============================
  quize-service:
    build:
      context: ./quize
    container_name: quize-service
    depends_on:
      - quiz-db
      - eureka-server
    ports:
      - "8090:8090"

volumes:
  question_data:
  quiz_data:
